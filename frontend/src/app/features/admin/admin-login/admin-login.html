<div class="min-h-screen flex items-center justify-center bg-gray-900 px-4">
  <div class="w-full max-w-md bg-gray-800 rounded-2xl shadow-sm border border-gray-700 p-8">
    <h1 class="text-2xl font-semibold text-white mb-1">AQD Admin</h1>

    @if (pendingToken()) {
      <p class="text-sm text-gray-400 mb-6">Enter the 6-digit code from your authenticator app.</p>

      <form [formGroup]="totpForm" (ngSubmit)="submitTotp()" class="space-y-4">
        <div>
          <label for="token" class="block text-sm font-medium text-gray-300 mb-1">Authentication code</label>
          <input
            id="token"
            type="text"
            inputmode="numeric"
            maxlength="6"
            formControlName="token"
            class="w-full rounded-lg border border-gray-600 bg-gray-900 text-white px-3 py-2 text-center text-xl tracking-[0.5em] focus:outline-none focus:ring-2 focus:ring-emerald-500"
            autocomplete="one-time-code"
          />
        </div>

        @if (errorMessage()) {
          <p class="text-sm text-red-400">{{ errorMessage() }}</p>
        }

        <button
          type="submit"
          [disabled]="submitting()"
          class="w-full rounded-lg bg-emerald-700 text-white py-2.5 font-medium hover:bg-emerald-800 disabled:opacity-50 transition"
        >
          {{ submitting() ? 'Verifying…' : 'Verify' }}
        </button>
      </form>
    } @else {
      <p class="text-sm text-gray-400 mb-6">Staff sign-in — support, matchmaking, admin, and super admin accounts only.</p>

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-300 mb-1">Email</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            class="w-full rounded-lg border border-gray-600 bg-gray-900 text-white px-3 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-500"
            autocomplete="email"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-300 mb-1">Password</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            class="w-full rounded-lg border border-gray-600 bg-gray-900 text-white px-3 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-500"
            autocomplete="current-password"
          />
        </div>

        @if (errorMessage()) {
          <p class="text-sm text-red-400">{{ errorMessage() }}</p>
        }

        <button
          type="submit"
          [disabled]="submitting()"
          class="w-full rounded-lg bg-emerald-700 text-white py-2.5 font-medium hover:bg-emerald-800 disabled:opacity-50 transition"
        >
          {{ submitting() ? 'Signing in…' : 'Sign in' }}
        </button>
      </form>
    }
  </div>
</div>

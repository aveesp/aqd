server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxied to the backend so the frontend's production
    # environment (relative apiBaseUrl: '/api/v1') works without knowing
    # the backend's real host — see src/environments/environment.prod.ts.
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO's engine.io transport path — distinct from the /chat
    # namespace used in application code, which is a logical grouping over
    # this same HTTP/WebSocket path, not a separate URL.
    location /socket.io/ {
        proxy_pass http://backend:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Angular client-side routing — any path not matched above falls back
    # to index.html so the Angular router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
